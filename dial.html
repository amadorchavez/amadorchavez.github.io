   <link href="https://fonts.googleapis.com/css2?family=Exo+2&display=swap" rel="stylesheet">

  <style>
    body {background:radial-gradient(circle,#333,#111);height:100vh;font-family:stratum2,'Exo 2';}
    text {font-family:stratum2,'Exo 2';}
    .quadrant {fill: #333F50;transition: ease all .25s;cursor: pointer;stroke-width:0;}
    #top:hover, #top.active {fill:#2d65bb}
    #right:hover, #right.active {fill:#c12}
    #bottom:hover, #bottom.active {fill:#4e3271;}
    #left:hover, #left.active {fill:#227150;}
    #dial {fill: rgba(255,255,255,0.15);transition: cubic-bezier(.25,.1,.21,1.37) all .35s;transform-origin: center;}
    #main {fill: #333F50;transition: ease all .25s;cursor: pointer;}
    #main:hover {fill:#e45534}
    #pointer {transition: cubic-bezier(.25,.1,.21,1.37) fill .15s .075s}
    .inactive {opacity:0.5}
    #run {transform-origin: 50% 20%;transition: cubic-bezier(.25,.1,.14,1.27) .25s all;}

    .card {letter-spacing:.05em;text-transform:uppercase;background: rgba(255,255,255,0.85);color: #313131;box-shadow: 0 0 1px rgba(57,70,78,.15),0 20px 55px -8px rgba(57,70,78,.25);transition:cubic-bezier(.68,-0.55,.27,1.55) transform .35s, cubic-bezier(.68,-0.55,.27,1.55) box-shadow .35s, cubic-bezier(.68,-0.55,.27,1.55) height .15s .5s;border-radius: 3px;line-height: 1.45em;font-size: 13px;position: relative;top: 6px;width: 300px;padding:2em;height:190px;overflow:hidden;will-change:transform;}
    .card:hover {transform: scale(1.1) translate(0px,-3px);box-shadow: 0px 10px 10px rgba(0,0,0,0.25);background:rgba(255,255,255,0.95);height:250px;}
    h2 {padding:0;margin:0;line-height:1.45em;font-weight:500;border-bottom:1px solid rgba(0,0,0,0.25);margin-bottom:.5em;padding-bottom:.25em;color:#222}
    p {padding:0;margin:0;margin-top:1.75em;line-height:1.45em;}

    .container {display:flex;align-items:center;gap:1em;padding:1em;}
    .container div {order:2;margin-left:3em;}

  </style>

</head>

<script>
  function chooseMe(quadrant, degrees) {
    const dialSelector = document.getElementById("dial")
    const dialPointer = document.getElementById("pointer")
    const quadrants = document.querySelectorAll(".quadrant")

    quadrants.forEach((entry)=>
         {
      entry.classList.remove("inactive")
      entry.classList.remove("active")
    });

    dialSelector.style['transform'] = "rotate(" +degrees +"deg)"
    dialPointer.style['fill'] = "#fff"
    quadrant.classList.add("active")
    quadrants.forEach((entry)=>
         {
           if (entry !== quadrant) {
      entry.classList.add("inactive")
    } else {return}});
  }

  function resetQuadrants() {
    const quadrants = document.querySelectorAll(".quadrant")
    const dialPointer = document.getElementById("pointer")

    quadrants.forEach((entry)=>
         {
      entry.classList.remove("inactive")
      entry.classList.remove("active")
    });
    dialPointer.style['fill'] = "inherit"
  }

</script>
