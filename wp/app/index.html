    <style>
    /*BoilerPlate CSS*/
    html, body {padding: 0;margin: 0;-webkit-font-smoothing: antialiased;-moz-osx-font-smoothing: grayscale;height:100%;}
    h1, h2, h3, h4, h5, h6 {font-weight: 400;margin: 0;padding: 0;}
    ::placeholder {color: rgba(20,0,0,1);opacity:1;}
    *:focus {outline: none;}

    /* Colors */
    :root {
      --main-bg-color: #333;
    }

    /* New CSS */
    body {font-family:Goldman Sans;}

    .gridContainer {display:grid;grid-template-columns:250px 1fr 1fr 1fr;grid-template-rows:1fr 1fr 1fr 1fr;}

    .sidebar {background:url('black-linen.png'), radial-gradient(circle,#2e31e4, #024388);grid-column: 1/1; grid-row:1/5;height:100vh;position:fixed;display:flex;width:250px;text-align:center;color:white;flex-flow:column;}
    .sidebar div {
      width: 100%;
      display: flex;
      align-items: center;
      text-align: left;
      text-transform: uppercase;
      font-size: .75em;
      margin-bottom: 1em;
      padding:1em;
      }
    .sidebar div:hover {background:rgba(205,210,255,0.1);cursor:pointer;}
    .sidebar div svg {margin-right:1em;}
    .sidebar h2 {font-size:1.35em;}

    .topBar {grid-column: 2/5;border-bottom: 1px solid;display: flex;position: fixed;left: 250px;width: calc(100% - 250px);justify-content: space-around;background: linear-gradient(#4f7186,#22323a);color: white;align-items: center;height: 90px;}
    .topBar svg {padding: 0 .5em;border-left: 1px solid rgba(255,255,255,0.15);}
    .topBar svg:hover {background: rgba(255,255,255,0.1);}

    .main {grid-row:2/5;grid-column: 2/5;padding:1em;}

    .accountBox {background:transparent;display:inline-block;width:100%;max-width:320px;min-height:200px;margin:0.5em;border-radius:5px;box-shadow:0 0 10px rgba(0,0,0,0.25);text-align:center;border: 1px solid #aaa;}
    .accountBox h2 {margin:1em 0;text-transform:uppercase;letter-spacing:0.05em;color:gray;font-size:1.15em;}

    .accountButton {background: linear-gradient(0deg,#cacaca,#e4e4fd);color: #445;padding: 0.5em 0;font-weight: 600;display:block;width:100%;text-decoration:none;transition: ease all .25s;border-top: 1px solid #ccc;}

    .accountImage {height:70px;background-color:#003971;border-radius:5px 5px 0 0;background-repeat: no-repeat;background-size: 40%;background-position: center;}

    .main h1 {margin-left:0.25em;margin-bottom:0.5em;}

    .subs h3 {margin:0;}

    input[type="text"] {
        cursor: pointer;
        text-align: center;
        font-size: 30px;
        padding: 0;
        margin: 0;
        width: 200px;
        border: none;
        font-family:Goldman Sans;
        background: transparent;
    }

    .chartContainer {position: relative; height:auto; width:100%;margin-top:-3em;z-index: -9;}
    #myChart {display: block; width: 100% !important; height: 100px !important;}

  /* Condensed View*/
    .condensed .sidebar {width:80px}
    .condensed .sidebar h2 {display:none}
    .condensed {grid-template-columns:80px 1fr 1fr 1fr;}
    .condensed .topBar {left:80px;width: calc(100% - 80px)}

/* Dark Mode */
    .dark {background:var(--main-bg-color);color:#eee;height:100%;}
    .dark .accountBox {background:rgba(255,255,255,0.035);border:1px solid rgba(255,255,255,0.15)}
    .dark .accountBox h2 {color:#aaa}
    .dark input[type="text"] {color:white;}
    .dark .accountButton {background:#444;color:white;border-top: 1px solid rgba(255,255,255,0.15)}

    </style>
