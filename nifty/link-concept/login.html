<!DOCTYPE html>

<html>
<head>
	<title>Login Test</title>

<style>
  body {margin:0;padding:0;background:linear-gradient(90deg, #ac1234, #214);background-image: url("http://www.powerpointhintergrund.com/uploads/green-hexagons-background-6.png");font-family:Roboto;}
  label {display:block;text-transform:uppercase;font-weight:500;font-size:12px;letter-spacing:-.03em;color:rgba(255,255,255,0.5);}
  input {border:none;background:none;border-bottom:1px solid rgba(255,255,255,0.25);font-family:Roboto;font-size:16px;color:white;font-weight:100;padding-top:1.25em;margin-bottom:2.75em;letter-spacing:.03em;transition: ease-in all 80ms;}
	input:focus {border-bottom:1px solid #698048;transition: ease-in all 80ms;}
  .submit {display:block;text-decoration:none;background:#ac7;padding:1em;color:white;text-align:center;transition:ease-in all 150ms;}
  .submit:hover {background:#9b6;transition:ease-in all 150ms;}
</style>
</head>

<body>
<div style="text-align:center;padding-top:2em;">
<div style="align-items: center;background: hsla(0,0%,100%,.8);padding: 30px;text-align: center;width:150px;height:325px;display:inline-block;position:relative;top:-245px;right:-4px;border-radius:5px 0px 0px 5px;border:1px solid rgba(255,255,255,0.25);box-shadow:2px 2px 15px rgba(0,0,0,0.5);z-index:1;">
<img style="position: relative;top: 110px;" src="https://niftymarketing.com/wp-content/uploads/2015/08/nifty_plain_black.png">
</div>

<form style="background: rgba(40,43,48,.75);border-radius: 0;padding: 30px;width: 340px;color:white;display:inline-block;position:relative;border-radius:0px 5px 5px 0px;text-align:left;border:1px solid rgba(255,255,255,0.25);box-shadow:2px 2px 15px rgba(0,0,0,0.5);">
<h3 style="text-align:center;margin-bottom:1.75em;text-transform:uppercase;">Login To Your Account</h3>
<label>Email</label>
<input type="text">
<label>Password</label>
<input type="password">
<a class="submit" href="#">Login</a>
</form>

</div>

</body>
</html>
