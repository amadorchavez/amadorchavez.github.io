<style>
  html, body{margin:0;padding:0;}
  a {text-decoration: none;color:#1c2;transition: ease-in all 150ms;}
  a:hover {color:#444;transition: ease-in all 150ms;}
  body {line-height:1.5em;font-family:Roboto;font-weight:200;color:#444;font-size:1.4em;}
  .header {padding:1em 3em;background:#1c88f2;color:white;}
  .button {background:#eee; color:#444; padding:1em; display:block;width:100%;max-width: 420px;margin-bottom: 10px;text-align: left;text-decoration: none;border:1px solid #ddd;transition: ease-in all 150ms;}
  .button:hover {background:#fafafa;transition: ease-in all 150ms;}
  .button-complete {background: #1c2; color:#cfc;padding:1em; display:block;width:100%;max-width: 420px;margin-bottom: 10px;text-align: center;text-decoration: none;border:1px solid #ddd;transition: ease-in all 150ms;}
  .button-complete:hover {background:#0b1; color:#cfc;transition: ease-in all 150ms;}
  .field {padding:1em 0;font-family: Roboto;color:#444;}
  label {display:inline-block;color:#777;text-transform: uppercase;letter-spacing: .03em;font-size:16px;}
  input {padding: .5em;border: 1px solid #ccc;width: 50px;font-size: 16px;font-family: roboto;color: #444;height:1em;margin-right:1.25em;}
  .content {margin:1em 3em;}
  select {
    height: 3em;
    border: 1px solid #ccc;
    display: inline-block;
    width: 50%;
    max-width: 220px;
    font-family: roboto;
    font-size: 16px;
}

table {border-collapse: collapse;text-align:center;font-size: 14px;text-align: left;width: 100%;box-shadow: 2px 2px 30px rgba(0,0,0,0.15)}
.header {background:#214;color:white;}
th {padding:.5em;text-align:left;}
td {padding:.5em .5em;border:1px solid #eee;}
tr:nth-child(even) {background:#efe;}
input[type=checkbox]:checked  + label { background-color: #265BFA; }
</style>
